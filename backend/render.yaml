services:
  # ─── BACKEND (Node/Express) ────────────────────────────────────────────────
  - type: web
    name: soundforge-backend
    runtime: node
    rootDir: .
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false          # paste from Render dashboard
      - key: JWT_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SUNO_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false          # paste your Render static site URL after deploying frontend

  # ─── FRONTEND (React/Vite Static Site) ────────────────────────────────────
  - type: web
    name: soundforge-frontend
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false          # paste your backend Render URL e.g. https://soundforge-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
